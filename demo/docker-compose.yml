version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: demo/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/demo/data:ro
    environment:
      - DEMO_DATA_DIR=/app/demo/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ..
      dockerfile: demo/Dockerfile.frontend
      args:
        NEXT_PUBLIC_DEMO_MODE: "true"
        NEXT_PUBLIC_API_URL: "http://api:8000"
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_DEMO_MODE=true
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
